button{padding:15px 30px;font-size:18px;cursor:pointer;border-radius:10px;border:none;background:#444;color:white}

<h2>📜 Lista de poderes</h2>
<div id="lista" style="max-height:300px; overflow-y:auto; text-align:left; margin:20px auto; width:80%; border:1px solid #444; padding:10px;"></div>
.anim{animation:pop 0.5s ease}
@keyframes pop{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}
.flash{animation:flash 0.3s}
@keyframes flash{0%{background:#fff}100%{background:#0a0a0a}}
#lista{
  max-height:300px;
  overflow-y:auto;
  text-align:left;
  margin:20px auto;
  width:80%;
  border:1px solid #444;
  padding:10px;
  font-size:14px;
}
function generarLista(){
  let total = poderes.reduce((s,p)=>s+p.prob,0);
  let lista = document.getElementById("lista");

  lista.innerHTML = ""; // limpiar por si acaso

  for(let p of poderes){
    let div = document.createElement("div");
    let chance = Math.floor(total / p.prob);
    div.textContent = p.nombre + " → 1 en " + chance;
    lista.appendChild(div);
  }
}

// 👇 ESTO ES LO QUE TE FALTABA
window.onload = generarLista;

function roll(){
let res=document.getElementById("resultado");
let probText=document.getElementById("prob");
res.innerText="Girando...";
res.classList.add("anim");

let spins=10;
let interval=setInterval(()=>{
res.innerText=poderes[Math.floor(Math.random()*poderes.length)].nombre;
spins--;
if(spins<=0){
clearInterval(interval);
finalRoll();
}
},100);
}

function finalRoll(){
let total=poderes.reduce((s,p)=>s+p.prob,0);
let rand=Math.random()*total;
let res=document.getElementById("resultado");
let probText=document.getElementById("prob");

for(let p of poderes){
if(rand<p.prob){
res.innerText=p.nombre;
probText.innerText="1 en "+Math.floor(total/p.prob);
res.className="anim";
document.getElementById("low").currentTime=0;
document.getElementById("low").play();
document.body.classList.add("flash");
setTimeout(()=>document.body.classList.remove("flash"),200);
return;
}
rand-=p.prob;
}
}
function generarLista(){

    let chance = Math.floor(total / p.prob);

    div.innerText = `${p.nombre} → 1 en ${chance}`;
    lista.appendChild(div);

}
